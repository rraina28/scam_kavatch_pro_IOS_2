name: scamkavatchpro

description: "Scam Kavatch Pro - AI-powered scam protection app that detects malicious links, fraudulent apps, and suspicious notifications in real time."

publish_to: 'none'

version: 1.0.57+64

environment:
  sdk: ">=3.3.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8
  shared_preferences: ^2.2.3
  app_settings: ^5.1.1
  provider: ^6.1.2
  google_mobile_ads: ^5.1.0
  url_launcher: ^6.3.0
  http: ^1.2.1
  in_app_purchase: ^3.1.13

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^2.0.0
  flutter_launcher_icons: ^0.13.1

flutter:
  uses-material-design: true

  assets:
    - assets/icon.png

flutter_launcher_icons:
  android: true
  ios: true
  image_path: assets/icon.png
  adaptive_icon_background: "#FFFFFF"
  adaptive_icon_foreground: assets/icon.png
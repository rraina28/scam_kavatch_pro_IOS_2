workflows:
  ios-release:
    name: iOS Release Build

    environment:
      flutter: stable
      xcode: 15.4

      ios_signing:
        distribution_type: app_store
        bundle_identifier: com.cybrains.scamkavatchpro

      groups:
        - app_store_connect

    scripts:
      - name: Flutter clean
        script: flutter clean

      - name: Get packages
        script: flutter pub get

      - name: Fetch signing files
        script: |
          app-store-connect fetch-signing-files \
            com.cybrains.scamkavatchpro \
            --type IOS_APP_STORE \
            --create

      - name: Set up code signing
        script: |
          xcode-project use-profiles

      - name: Build IPA
        script: |
          flutter build ipa \
            --release \
            --build-name=1.0.57 \
            --build-number=64

    artifacts:
      - build/ios/ipa/*.ipa

    publishing:
      app_store_connect:
        submit_to_testflight: true
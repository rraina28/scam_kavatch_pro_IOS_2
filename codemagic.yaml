workflows:
  ios-release:
    name: iOS Release Build

    environment:
      flutter: stable
      xcode: latest
      groups:
        - app_store_connect

      ios_signing:
        distribution_type: app_store
        bundle_identifier: com.cybrains.scamkavatchpro

    scripts:
      - name: Flutter clean
        script: flutter clean

      - name: Get packages
        script: flutter pub get

      - name: Build IPA
        script: flutter build ipa --release --export-options-plist=ios/Runner/ExportOptions.plist

    artifacts:
      - build/ios/ipa/*.ipa
workflows:
  ios-release:
    name: iOS Release Build
    max_build_duration: 30
    instance_type: mac_mini_m2

    environment:
      flutter: stable
      xcode: latest

      groups:
        - app_store_connect

      ios_signing:
        distribution_type: app_store
        bundle_identifier: com.cybrains.scamkavatchpro

    scripts:

      - name: Flutter clean
        script: flutter clean

      - name: Get packages
        script: flutter pub get

      # ⭐ Fetch certificates + provisioning profile
      - name: Fetch signing files
        script: |
          keychain initialize
          app-store-connect fetch-signing-files \
            --bundle-id com.cybrains.scamkavatchpro \
            --type IOS_APP_STORE
          keychain add-certificates
          xcode-project use-profiles

      - name: Build IPA
        script: flutter build ipa --release --export-method app-store

    artifacts:
      - build/ios/ipa/*.ipa